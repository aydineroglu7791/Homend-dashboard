<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homend – Aylık Satış Performans Özeti</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1b2d;--bg2:#162236;--bg3:#1c2e45;--bg4:#243652;
  --acc:#4e9af1;--acc2:#34c9a0;--acc3:#f5a623;--acc4:#e05a5a;--acc5:#9b7fe8;
  --txt:#e8f0fe;--txt2:#8faac8;--txt3:#5c7a99;
  --border:rgba(78,154,241,.18);--r:10px;--r2:14px
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);min-height:100vh;padding:16px}
.dash{max-width:1600px;margin:0 auto}
@media(min-width:900px){.dash{padding:0 20px}body{padding:20px 20px}}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.brand{display:flex;gap:10px;align-items:flex-start}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:3px}
.brand-title{font-size:15px;font-weight:500;color:var(--txt)}
.brand-sub{font-size:11px;color:var(--txt2);margin-top:2px}
/* FILTERS */
.fgroups{display:flex;align-items:center;gap:12px}
.fgroup{display:flex;align-items:center;gap:6px;position:relative}
.fgroup-label{font-size:10px;color:var(--txt3);flex-shrink:0}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;color:var(--txt2);font-size:11px;padding:4px 11px;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;flex-shrink:0}
.pill:hover{border-color:rgba(78,154,241,.5);color:var(--txt)}
.pill.active{background:rgba(78,154,241,.18);border-color:var(--acc);color:var(--acc);font-weight:500}
.dd-btn{background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;color:var(--txt);font-size:12px;padding:5px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;user-select:none;transition:all .15s}
.dd-btn:hover{border-color:rgba(78,154,241,.5)}
.dd-btn.open{border-color:var(--acc);color:var(--acc)}
.dd-arrow{font-size:9px;color:var(--txt3);transition:transform .2s}
.dd-btn.open .dd-arrow{transform:rotate(180deg)}
.dd-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--r);padding:6px;display:none;z-index:999;min-width:80px;max-height:320px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.dd-menu.open{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.dd-item{background:transparent;border:none;border-radius:6px;color:var(--txt2);font-size:11px;padding:5px 8px;cursor:pointer;text-align:center;transition:all .1s;white-space:nowrap}
.dd-item:hover{background:var(--bg4);color:var(--txt)}
.dd-item.active{background:rgba(78,154,241,.18);color:var(--acc);font-weight:500}
/* TOPLAM */
.toplam-block{background:linear-gradient(135deg,#1a2e50,#0f1b2d);border:1px solid rgba(155,127,232,.35);border-radius:var(--r2);padding:20px 24px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.toplam-left{}
.toplam-label{font-size:10px;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.toplam-val{font-size:36px;font-weight:500;color:#c4b5fc}@media(min-width:900px){.toplam-val{font-size:36px}.kcard-val{font-size:18px!important}.brand-title{font-size:17px}}
.toplam-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.toplam-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.toplam-icon{font-size:40px;color:rgba(155,127,232,.15);flex-shrink:0}
/* GY badge */
.gy-row{font-size:11px;color:var(--txt3);margin-top:2px}
/* SECTIONS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.kblock{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:16px 20px}
.kblock-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kblock-title{font-size:10px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--txt2)}
.kblock-dot{width:6px;height:6px;border-radius:50%}
.kgrid{display:grid;gap:8px}
.kcard{background:var(--bg3);border-radius:var(--r);padding:12px 16px}
.kcard-lbl{font-size:11px;color:var(--txt2);margin-bottom:5px}
.kcard-val{font-size:20px;font-weight:500;color:var(--txt);margin-bottom:6px}
.kcard-val.big{font-size:20px}
.kcard-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.pos{background:rgba(52,201,160,.15);color:#34c9a0}
.neg{background:rgba(224,90,90,.15);color:#e05a5a}
.neu{background:rgba(78,154,241,.15);color:#4e9af1}
.gy-badge{font-size:12px;color:#9dc4de;font-weight:400}
/* bar chart */
.chart-title{font-size:10px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--txt2);margin-bottom:12px}
.mini-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.mbl{font-size:13px;color:var(--txt2);width:100px;flex-shrink:0}
.mbt{flex:1;height:9px;background:var(--bg4);border-radius:4px;overflow:hidden}
.mbf{height:100%;border-radius:4px;transition:width .4s ease}
.mbv{font-size:13px;font-weight:500;color:var(--txt);width:80px;text-align:right;flex-shrink:0}
.no-data{color:var(--txt3);font-size:12px;font-style:italic;text-align:center;padding:12px}
@media(max-width:700px){.grid2,.grid3,.bottom-grid{grid-template-columns:1fr}div[style*='grid-template-columns:2fr']{grid-template-columns:1fr!important}.pills{max-width:100%}.kcard{padding:10px 12px!important}.kblock{padding:14px 16px!important}.kcard-val{font-size:16px!important}.kcard-lbl{font-size:10px!important}.toplam-block{padding:16px 20px!important}}
</style>
</head>
<body>
<div class="dash">
  <!-- TOPBAR ROW 1: başlık sol, versiyon sağ -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-title">Homend Aylık Satış Performans Özeti</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;padding:3px 10px;flex-shrink:0">
      <span style="font-size:10px;color:var(--acc);font-weight:500">v1-1</span>
      <span style="font-size:9px;color:var(--txt3)">•</span>
      <span style="font-size:10px;color:var(--txt2)" id="ver-date"></span>
    </div>
  </div>
  <!-- TOPBAR ROW 2: filtreler -->
  <div class="topbar">
    <div class="fgroups">
      <div class="fgroup"><span class="fgroup-label">Yıl</span><div class="pills" id="fy"></div></div>
      <div class="fgroup">
        <span class="fgroup-label">Ay</span>
        <div style="position:relative">
          <button class="dd-btn" id="hw-btn" onclick="toggleDd()">
            <span id="hw-label">Mayıs</span>
            <span class="dd-arrow">▼</span>
          </button>
          <div class="dd-menu" id="hw-menu"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOPLAM CİRO -->
  <div class="toplam-block" id="toplam-block">
    <div class="toplam-left">
      <div class="toplam-label">Toplam Ciro</div>
      <div class="toplam-val" id="t-val">—</div>
      <div class="toplam-meta" id="t-meta"></div>
    </div>
    <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="rgba(155,127,232,.22)" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </div>

  <!-- PERAKENDE + GRUP İÇİ -->
  <div class="grid2">
    <div class="kblock">
      <div class="kblock-header">
        <span class="kblock-title">Perakende Satışları</span>
        <span class="kblock-dot" style="background:#4e9af1"></span>
      </div>
      <div class="kgrid" style="grid-template-columns:1fr 1fr 1fr 1fr" id="per-cards"></div>
    </div>
    <div class="kblock">
      <div class="kblock-header">
        <span class="kblock-title">Grup İçi Satışlar</span>
        <span class="kblock-dot" style="background:#34c9a0"></span>
      </div>
      <div class="kgrid" style="grid-template-columns:1fr 1fr 1fr" id="gi-cards"></div>
    </div>
  </div>

  <!-- KURUMSAL + E-TİCARET -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px">
    <div class="kblock">
      <div class="kblock-header">
        <span class="kblock-title">Kurumsal Satışlar</span>
        <span class="kblock-dot" style="background:#f5a623"></span>
      </div>
      <div class="kgrid" style="grid-template-columns:1fr 1fr 1fr 1fr" id="kur-cards"></div>
    </div>
    <div class="kblock">
      <div class="kblock-header">
        <span class="kblock-title">E-Ticaret</span>
        <span class="kblock-dot" style="background:#e05a5a"></span>
      </div>
      <div class="kgrid" style="grid-template-columns:1fr 1fr" id="et-cards"></div>
    </div>
  </div>

  <!-- TOPTAN + BAR CHART -->
  <div class="bottom-grid">
    <div class="kblock">
      <div class="kblock-header">
        <span class="kblock-title">Toptan Satış</span>
        <span class="kblock-dot" style="background:#f5a623"></span>
      </div>
      <div id="top-cards"></div>
    </div>
    <div class="kblock">
      <div class="chart-title">Kanal bazlı ciro dağılımı</div>
      <div id="bars"></div>
    </div>
  </div>
</div>

// ---- VERSION DATE ----
document.getElementById('ver-date').textContent = new Date().toLocaleDateString('tr-TR', {day:'2-digit',month:'2-digit',year:'numeric'});

// ---- STATE ----
let selYear = 2026;
let selAy = 5;

// ---- HELPERS ----
const fmtTL = v => {
  if(v == null) return '—';
  const abs = Math.abs(v);
  if(abs >= 1000000) return (v<0?'-':'') + '₺' + (abs/1000000).toFixed(2) + 'M';
  return (v<0?'-':'') + '₺' + Math.round(abs).toLocaleString('tr-TR');
};
const fmtPct = v => v == null ? '—' : (v>=0?'+':'')+v.toFixed(1)+'%';
const badge = (v, isRatio=false) => {
  if(v==null) return '';
  const cls = v>=0?'pos':'neg';
  const txt = isRatio ? fmtPct(v) : fmtPct(v);
  return `<span class="badge ${cls}">${txt}</span>`;
};
const gyBadge = (cur, gy) => {
  if(cur==null||gy==null||gy===0) return '';
  const pct = ((cur-gy)/Math.abs(gy))*100;
  return badge(pct);
};

// ---- BUILD PILLS ----
function toggleDd(){
  const btn = document.getElementById('hw-btn');
  const menu = document.getElementById('hw-menu');
  btn.classList.toggle('open');
  menu.classList.toggle('open');
}
document.addEventListener('click', e=>{
  if(!e.target.closest('#hw-btn') && !e.target.closest('#hw-menu')){
    document.getElementById('hw-btn').classList.remove('open');
    document.getElementById('hw-menu').classList.remove('open');
  }
});
const AY_ISIM = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
function buildWeekDd(aylar, sel){
  const menu = document.getElementById('hw-menu');
  const btn = document.getElementById('hw-label');
  menu.innerHTML='';
  btn.textContent = AY_ISIM[sel];
  aylar.forEach(v=>{
    const b = document.createElement('button');
    b.className='dd-item'+(v===sel?' active':'');
    b.textContent = AY_ISIM[v];
    b.onclick=()=>{
      selAy=v;
      document.getElementById('hw-btn').classList.remove('open');
      document.getElementById('hw-menu').classList.remove('open');
      render();
    };
    menu.appendChild(b);
  });
}
function makePills(id, items, sel, cb){
  const el = document.getElementById(id);
  el.innerHTML='';
  items.forEach(v=>{
    const b = document.createElement('button');
    b.className='pill'+(v===sel?' active':'');
    b.textContent=v;
    b.onclick=()=>{cb(v); render();};
    el.appendChild(b);
  });
}

// ---- RENDER ----
function render(){
  const key = `${selYear}_${selAy}`;
  const d = RAW[key];

  // Year pills
  makePills('fy',[2024,2025,2026],selYear,v=>{
    selYear=v;
    // Pick last week that has actual perakende ciro data
    const wks = Object.values(RAW)
      .filter(x=>x.yil===v && x.perakende && x.perakende.ciro)
      .map(x=>x.hafta).sort((a,b)=>a-b);
    selAy = wks.length ? wks[wks.length-1] : 1;
    render();
  });
  // Week dropdown
  const wks = Object.values(RAW).filter(x=>x.yil===selYear).map(x=>x.ay).sort((a,b)=>a-b);
  buildWeekDd(wks, selAy);

  if(!d){
    document.getElementById('t-val').textContent='Veri yok';
    return;
  }

  const p=d.perakende, gi=d.grup_ici, k=d.kurumsal, e=d.eticaret, t=d.toptan;

  // TOPLAM
  document.getElementById('t-val').textContent = fmtTL(d.toplam_ciro);
  const prevKey = `${selYear}_${selAy-1}`;
  const prev = RAW[prevKey];
  let metaHTML = '';
  if(prev && prev.toplam_ciro){
    const pct = ((d.toplam_ciro - prev.toplam_ciro)/Math.abs(prev.toplam_ciro))*100;
    metaHTML += `<span class="toplam-badge ${pct>=0?'pos':'neg'}">${pct>=0?'↑':'↓'} ${Math.abs(pct).toFixed(1)}%</span>`;
    metaHTML += `<span style="font-size:10px;color:var(--txt3)">önceki aya göre</span>`;
  }
  // GY karşılaştırma
  const gyKey = `${selYear-1}_${selAy}`;
  const gyD = RAW[gyKey];
  if(gyD && gyD.toplam_ciro){
    const gyPct = ((d.toplam_ciro - gyD.toplam_ciro)/Math.abs(gyD.toplam_ciro))*100;
    metaHTML += `&nbsp;&nbsp;<span class="toplam-badge ${gyPct>=0?'pos':'neg'}">${gyPct>=0?'↑':'↓'} ${Math.abs(gyPct).toFixed(1)}%</span>`;
    metaHTML += `<span style="font-size:10px;color:var(--txt3)">geçen yıl ${AY_ISIM[selAy]}</span>`;
  }
  document.getElementById('t-meta').innerHTML = metaHTML;

  // PERAKENDE
  document.getElementById('per-cards').innerHTML = [
    {lbl:'Ciro', val:fmtTL(p.ciro), b:'', sub: p.gy_ciro?`GY: ${fmtTL(p.gy_ciro)}`:'', color:''},
    {lbl:'LfL Adet', val:p.lfl_adet!=null?fmtPct(p.lfl_adet):'—', b:'', sub:'', color: p.lfl_adet!=null?(p.lfl_adet>=0?'#34c9a0':'#e05a5a'):''},
    {lbl:'LfL Ciro',  val:p.lfl_ciro!=null?fmtPct(p.lfl_ciro):'—', b:'', sub:'', color: p.lfl_ciro!=null?(p.lfl_ciro>=0?'#34c9a0':'#e05a5a'):''},
    {lbl:'GM%', val:p.gm!=null?`%${p.gm.toFixed(1)}`:'—', b:'', sub:'', color:''}
  ].map(c=>`<div class="kcard">
    <div class="kcard-lbl">${c.lbl}</div>
    <div class="kcard-val" style="${c.color?'color:'+c.color:''}">${c.val}</div>
    <div class="kcard-row">${c.b}${c.sub?`<span class="gy-badge" style="font-size:${c.subColor?'14px':'11px'};color:${c.subColor||'#7da8c8'};font-weight:${c.subColor?'600':'400'}">${c.sub}</span>`:''}</div>
  </div>`).join('');

  // GRUP İÇİ
  document.getElementById('gi-cards').innerHTML = [
    {lbl:'Karaca', cur:gi.krc_ciro, gy:gi.krc_gy},
    {lbl:'Jumbo',  cur:gi.jmbo_ciro, gy:gi.jmbo_gy},
    {lbl:'Homend', cur:gi.hedt_ciro, gy:gi.hedt_gy},
  ].map(c=>`<div class="kcard">
    <div class="kcard-lbl">${c.lbl}</div>
    <div class="kcard-val">${fmtTL(c.cur)}</div>
    <div class="kcard-row">${gyBadge(c.cur,c.gy)}${c.gy?`<span class="gy-badge">GY: ${fmtTL(c.gy)}</span>`:''}</div>
  </div>`).join('');

  // KURUMSAL
  document.getElementById('kur-cards').innerHTML = [
    {lbl:'Market Ciro',   val:k.market},
    {lbl:'Grup İçi',      val:k.grup_ici},
    {lbl:'Online Retail', val:k.online_retail},
    {lbl:'Yurt Dışı',     val:k.yurt_disi},
  ].map(c=>`<div class="kcard">
    <div class="kcard-lbl">${c.lbl}</div>
    <div class="kcard-val" style="font-size:14px">${fmtTL(c.val)}</div>
  </div>`).join('');

  // E-TİCARET
  document.getElementById('et-cards').innerHTML = [
    {lbl:'Web Ciro', val:e.web},
    {lbl:'Marketplace', val:e.marketplace},
  ].map(c=>`<div class="kcard">
    <div class="kcard-lbl">${c.lbl}</div>
    <div class="kcard-val">${fmtTL(c.val)}</div>
  </div>`).join('');

  // TOPTAN
  document.getElementById('top-cards').innerHTML = `<div class="kcard" style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <div class="kcard-lbl">Toptan Satış Cirosu</div>
      <div class="kcard-val big">${fmtTL(t.ciro)}</div>
    </div>
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(245,166,35,.25)" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
  </div>`;

  // BAR CHART
  const channels = [
    {lbl:'Perakende', val:p.ciro||0, color:'#4e9af1'},
    {lbl:'Grup İçi',  val:(gi.krc_ciro||0)+(gi.jmbo_ciro||0)+(gi.hedt_ciro||0), color:'#34c9a0'},
    {lbl:'Kurumsal',  val:(k.market||0)+(k.grup_ici||0)+(k.online_retail||0)+(k.yurt_disi||0), color:'#f5a623'},
    {lbl:'E-Ticaret', val:(e.web||0)+(e.marketplace||0), color:'#e05a5a'},
    {lbl:'Toptan',    val:t.ciro||0, color:'#9b7fe8'},
  ];
  const maxV = Math.max(...channels.map(c=>c.val));
  document.getElementById('bars').innerHTML = channels.map(c=>`
    <div class="mini-bar-row">
      <span class="mbl">${c.lbl}</span>
      <div class="mbt"><div class="mbf" style="width:${Math.round(c.val/maxV*100)}%;background:${c.color}"></div></div>
      <span class="mbv">${fmtTL(c.val)}</span>
    </div>`).join('');
}

// ---- INIT ----
render();
</script>
</body>
</html>
