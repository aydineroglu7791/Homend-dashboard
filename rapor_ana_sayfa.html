<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homend Rapor Merkezi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --green-900:#0B3D24;
    --green-800:#0E4E2E;
    --green-700:#106238;
    --green-600:#147741;
    --green-500:#1B8F4E;
    --green-400:#2FA862;
    --green-300:#54C280;
    --green-100:#E4F5EA;
    --green-50:#F3FAF5;
    --ink:#16211A;
    --muted:#5E6E64;
    --line:#D9EBE0;
    --white:#FFFFFF;
    --shadow:0 1px 2px rgba(11,61,36,.06),0 8px 24px -12px rgba(11,61,36,.18);
  }
  html,body{background:var(--green-50);color:var(--ink);font-family:'Inter',sans-serif;}
  .wrap{max-width:1400px;margin:0 auto;padding:20px 22px 60px;}

  /* HEADER */
  .topbar{
    background:linear-gradient(120deg,var(--green-900) 0%,var(--green-700) 55%,var(--green-500) 100%);
    border-radius:20px;
    padding:26px 30px;
    color:#fff;
    position:relative;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:22px;
  }
  .topbar::after{
    content:"";
    position:absolute; right:-60px; top:-60px;
    width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.14) 0%,rgba(255,255,255,0) 70%);
  }
  .topbar::before{
    content:"";
    position:absolute; left:30%; bottom:-90px;
    width:220px; height:220px; border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.08) 0%,rgba(255,255,255,0) 70%);
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;position:relative;z-index:1;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-badge{
    width:52px;height:52px;border-radius:14px;
    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.35);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;
    flex-shrink:0;
  }
  .brand-text h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(19px,2.6vw,26px);letter-spacing:.01em;}
  .brand-text p{font-size:12.5px;color:rgba(255,255,255,.75);margin-top:3px;font-weight:500;letter-spacing:.02em;}
  .topbar-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .meta-pill{
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.28);
    padding:7px 14px;border-radius:100px;
    font-size:11.5px;font-weight:600;color:#fff;
    display:flex;align-items:center;gap:6px;
  }
  .meta-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green-300);}

  .searchbar{margin-top:20px;position:relative;z-index:1;}
  .searchbar input{
    width:100%;padding:13px 16px 13px 44px;border-radius:12px;border:none;
    background:rgba(255,255,255,.95);color:var(--ink);font-size:14px;font-family:'Inter',sans-serif;font-weight:500;
    outline:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4);
  }
  .searchbar input::placeholder{color:var(--muted);}
  .searchbar svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);}
  .search-count{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:11.5px;color:var(--muted);font-weight:600;display:none;}

  /* GRID OF GROUPS */
  .groups{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
    gap:18px;
  }
  .group{
    background:#fff;border:1px solid var(--line);border-radius:18px;
    padding:20px;box-shadow:var(--shadow);
    transition:.35s;
  }
  .group.no-match{opacity:.25;filter:grayscale(.5);}
  .group-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .group-icon{
    width:40px;height:40px;border-radius:11px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#fff;
  }
  .group-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15.5px;color:var(--ink);}
  .group-count{margin-left:auto;font-size:11px;font-weight:700;color:var(--green-600);background:var(--green-100);padding:4px 10px;border-radius:100px;}

  .btn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px;}
  .rbtn{
    background:var(--green-50);
    border:1px solid var(--line);
    color:var(--green-800);
    font-family:'Inter',sans-serif;font-weight:600;font-size:12.5px;
    padding:12px 10px;border-radius:10px;cursor:pointer;
    transition:.18s;text-align:center;line-height:1.25;
    display:flex;align-items:center;justify-content:center;min-height:44px;
  }
  .rbtn:hover{background:var(--green-500);border-color:var(--green-500);color:#fff;transform:translateY(-2px);box-shadow:0 8px 16px -8px rgba(20,119,65,.5);}
  .rbtn.hide{display:none;}
  .rbtn mark{background:var(--green-300);color:#0B3D24;border-radius:3px;padding:0 1px;}
  .rbtn:hover mark{background:rgba(255,255,255,.5);color:var(--green-900);}

  footer{text-align:center;margin-top:28px;color:var(--muted);font-size:12px;font-weight:500;}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);
    background:var(--green-900);color:#fff;padding:12px 22px;border-radius:100px;
    font-size:13px;font-weight:600;box-shadow:0 12px 30px -10px rgba(11,61,36,.5);
    opacity:0;pointer-events:none;transition:.25s;z-index:50;
    display:flex;align-items:center;gap:8px;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);}
  .toast .tdot{width:7px;height:7px;border-radius:50%;background:var(--green-300);}

  @media(max-width:520px){
    .topbar{padding:20px;}
    .wrap{padding:14px 12px 50px;}
    .btn-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <div class="brand-badge">H</div>
        <div class="brand-text">
          <h1>Homend Rapor Merkezi</h1>
          <p>Satış &amp; Operasyon Raporları · Ana Sayfa</p>
        </div>
      </div>
      <div class="topbar-meta">
        <div class="meta-pill"><span class="dot"></span> 7 Rapor Grubu</div>
        <div class="meta-pill" id="btnCountPill">— Rapor</div>
        <div class="meta-pill">Son Güncelleme: 21.07.2026</div>
      </div>
    </div>
    <div class="searchbar">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
      <input id="searchInput" type="text" placeholder="Rapor ara… (örn. mağaza, hafta, cover, fiyatlandırma)">
      <span class="search-count" id="searchCount"></span>
    </div>
  </div>

  <div class="groups" id="groupsWrap"></div>

  <footer>Homend Rapor Merkezi · v0.1 — tasarım aşaması, raporlar sırayla bağlanacak</footer>
</div>

<div class="toast" id="toast"><span class="tdot"></span><span id="toastText"></span></div>

<script>
const ICONS = {
  store: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1.5-5h15L21 9"/><path d="M3 9h18v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9z"/><path d="M9 20v-6h6v6"/></svg>',
  calendar: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  globe: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18z"/></svg>',
  truck: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="7" width="14" height="10"/><path d="M15 10h4l3 3v4h-7z"/><circle cx="6" cy="19" r="1.6"/><circle cx="17.5" cy="19" r="1.6"/></svg>',
  sigma: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 5H6l7 7-7 7h12"/></svg>',
  compass: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polygon points="15,9 13.5,13.5 9,15 10.5,10.5"/></svg>',
  gear: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V19a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.04-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.04H4a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.04 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H10a1.7 1.7 0 0 0 1.04-1.56V4a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.04 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V10a1.7 1.7 0 0 0 1.56 1.04H20a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1.04z"/></svg>'
};

// Excel "Rapor Ana Sayfa" ile birebir eşleşen grup ve buton listesi
const GROUPS = [
  { title:"Perakende Hafta", icon:"store", shade:"var(--green-900)",
    buttons:["Per Özet Haf","Per Mağaza Haf","Grup Per Haf","Per. Ürün Hafta","Per Ürün Gr Haf","Grup Shark Haf","Mağ KPI Karş","Ür Gru KPI Karş","Dış Marka Oran"] },
  { title:"Perakende Ay / Yıl", icon:"calendar", shade:"var(--green-800)",
    buttons:["Per. Özet Ay","Per. Mağaza Ay","Grup Per Ay","Per. Ürün Ay","Per Ürün Gr Ay","Grup İçi Shark","Per Özet Yıl","Per Mağaza Yıl","Grup Per Yıl"] },
  { title:"E-Ticaret & Kurumsal", icon:"globe", shade:"var(--green-700)",
    buttons:["E Ticaret Haf","E Ticaret Ay","Kurum Satış Hf","MP Hafta","Kurum Satış Ay","MP Ay"] },
  { title:"Toptan", icon:"truck", shade:"var(--green-600)",
    buttons:["Top Satış Haf","Top Sat Ür Gr","Top Satış Ay","Top Sat Ür Gr","Top Sat Ür Gr"] },
  { title:"Toplamlar", icon:"sigma", shade:"var(--green-500)",
    buttons:["Toplam Satış","Toplam Ciro Ay","Ürün Gr Cir Haf","Ürün Gr Ad Haf","Ürün Rap Haf","Tüm Ürün Ay","Top Ür Gr Cir","Top Ür Gr Adet","Yıl Bütçe"] },
  { title:"S&OP", icon:"compass", shade:"var(--green-400)",
    buttons:["Cover Raporu","Satış Trendi","S&OP Adet","Sas Stok Detay","Fiyatlandırma","S&OP Maaliyet","SAS Raporu","S&OP Notları"] },
  { title:"Admin", icon:"gear", shade:"var(--green-300)",
    buttons:["Tema Kataloğu","Butonları"] },
];

const wrap = document.getElementById('groupsWrap');
let totalButtons = 0;

GROUPS.forEach((g, gi) => {
  totalButtons += g.buttons.length;
  const panel = document.createElement('div');
  panel.className = 'group';
  panel.dataset.groupIndex = gi;

  panel.innerHTML = `
    <div class="group-head">
      <div class="group-icon" style="background:${g.shade}">${ICONS[g.icon]}</div>
      <div class="group-title">${g.title}</div>
      <div class="group-count">${g.buttons.length}</div>
    </div>
    <div class="btn-grid">
      ${g.buttons.map((b,i) => `<button class="rbtn" data-name="${b}" data-key="${gi}-${i}">${b}</button>`).join('')}
    </div>
  `;
  wrap.appendChild(panel);
});

document.getElementById('btnCountPill').textContent = totalButtons + ' Rapor';

// Buton tıklama -> ileride her butona ilgili raporu bağlayacağız.
// Şimdilik sadece bilgilendirme toast'ı gösteriyor.
const toast = document.getElementById('toast');
const toastText = document.getElementById('toastText');
let toastTimer;
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.rbtn');
  if (!btn) return;
  toastText.textContent = `“${btn.dataset.name}” raporu yakında bağlanacak`;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
});

// Arama / filtreleme
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');
function normalize(s){ return s.toLocaleLowerCase('tr').trim(); }

searchInput.addEventListener('input', () => {
  const q = normalize(searchInput.value);
  let matchCount = 0;
  document.querySelectorAll('.group').forEach(panel => {
    let groupHasMatch = false;
    panel.querySelectorAll('.rbtn').forEach(btn => {
      const name = btn.dataset.name;
      const isMatch = q === '' || normalize(name).includes(q);
      btn.classList.toggle('hide', !isMatch);
      if (isMatch){
        groupHasMatch = true;
        if(q !== '') matchCount++;
        btn.innerHTML = q === '' ? name : name.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i'), '<mark>$1</mark>');
      } else {
        btn.innerHTML = name;
      }
    });
    panel.classList.toggle('no-match', !groupHasMatch);
  });
  if (q === ''){
    searchCount.style.display = 'none';
  } else {
    searchCount.style.display = 'inline';
    searchCount.textContent = matchCount + ' eşleşme';
  }
});
</script>
</body>
</html>
