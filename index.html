<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homend – Satış Performans Özeti</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1520;--bg2:#111f30;--bg3:#172840;--bg4:#1e3250;
  --acc:#3d8ef0;--acc2:#2ec99a;--acc3:#f0a030;--acc4:#e05060;--acc5:#8870e0;
  --txt:#ddeeff;--txt2:#7a9ab8;--txt3:#4a6a88;
  --border:rgba(61,142,240,.15);--r:8px;--r2:12px
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);min-height:100vh;padding:16px}
.dash{max-width:1600px;margin:0 auto}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--acc);flex-shrink:0}
.brand-title{font-size:16px;font-weight:500;color:var(--txt)}
.brand-tag{background:rgba(61,142,240,.15);border:0.5px solid rgba(61,142,240,.3);border-radius:6px;padding:2px 8px;font-size:10px;color:var(--acc);letter-spacing:.3px}
.topbar-right{display:flex;align-items:center;gap:8px}
.ver-badge{display:flex;align-items:center;gap:4px;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;padding:3px 10px}
.ver-txt{font-size:10px;color:var(--acc);font-weight:500}
.ver-date{font-size:10px;color:var(--txt2)}

/* MODE TABS */
.mode-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.mode-tabs{display:flex;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:3px;gap:2px}
.mode-tab{padding:6px 18px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--txt2);transition:all .2s}
.mode-tab.active{background:var(--acc);color:#fff}
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:5px}
.filter-label{font-size:10px;color:var(--txt3);white-space:nowrap}
.pills{display:flex;gap:3px}
.pill{background:var(--bg3);border:0.5px solid var(--border);border-radius:16px;color:var(--txt2);font-size:11px;padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.pill:hover{border-color:rgba(61,142,240,.4);color:var(--txt)}
.pill.active{background:rgba(61,142,240,.2);border-color:var(--acc);color:var(--acc);font-weight:500}
.dd-btn{background:var(--bg3);border:0.5px solid var(--border);border-radius:16px;color:var(--txt);font-size:11px;padding:4px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;user-select:none;transition:all .15s}
.dd-btn.open{border-color:var(--acc);color:var(--acc)}
.dd-arrow{font-size:8px;color:var(--txt3);transition:transform .2s}
.dd-btn.open .dd-arrow{transform:rotate(180deg)}
.dd-wrap{position:relative}
.dd-menu{position:absolute;top:calc(100% + 5px);right:0;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--r);padding:5px;display:none;z-index:999;min-width:75px;max-height:300px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);scrollbar-width:thin}
.dd-menu.open{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}
.dd-item{background:transparent;border:none;border-radius:5px;color:var(--txt2);font-size:11px;padding:5px 6px;cursor:pointer;text-align:center;transition:all .1s}
.dd-item:hover{background:var(--bg4);color:var(--txt)}
.dd-item.active{background:rgba(61,142,240,.2);color:var(--acc);font-weight:500}

/* TOPLAM */
.toplam-block{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:18px 22px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.toplam-inner{}
.toplam-label{font-size:10px;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.toplam-val{font-size:32px;font-weight:500;color:var(--txt)}
.toplam-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.t-badge{font-size:11px;padding:2px 8px;border-radius:16px;font-weight:500}
.t-label{font-size:10px;color:var(--txt3)}
.toplam-icon{opacity:.08;font-size:48px}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.grid-2b{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}

/* BLOCKS */
.block{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.block-left{display:flex;align-items:center;gap:7px}
.block-dot{width:7px;height:7px;border-radius:50%}
.block-title{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--txt2)}
.block-icon{opacity:.2;font-size:16px}
.cards-grid{display:grid;gap:8px}
.cg4{grid-template-columns:repeat(4,1fr)}
.cg3{grid-template-columns:repeat(3,1fr)}
.cg2{grid-template-columns:repeat(2,1fr)}

/* CARDS */
.kcard{background:var(--bg3);border-radius:var(--r);padding:12px 14px}
.kcard-lbl{font-size:10px;color:var(--txt3);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.kcard-val{font-size:18px;font-weight:500;color:var(--txt);margin-bottom:4px}
.kcard-sub{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.gy{font-size:11px;color:#6a9ab8}
.badge{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:500}
.pos{background:rgba(46,201,154,.15);color:#2ec99a}
.neg{background:rgba(224,80,96,.15);color:#e05060}
.neu{background:rgba(61,142,240,.15);color:#3d8ef0}

/* BOTTOM */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

/* BAR CHART */
.chart-title{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-lbl{font-size:12px;color:var(--txt2);width:85px;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar-val{font-size:12px;font-weight:500;color:var(--txt);width:75px;text-align:right;flex-shrink:0}

/* MOBILE */
@media(max-width:700px){
  body{padding:10px}
  .grid-2,.grid-2b,.bottom-grid{grid-template-columns:1fr!important}
  .cg4{grid-template-columns:repeat(4,1fr)!important}
  .cg3{grid-template-columns:repeat(3,1fr)!important}
  .cg2{grid-template-columns:repeat(2,1fr)!important}
  .toplam-val{font-size:22px}
  .kcard{padding:7px 8px!important}
  .kcard-val{font-size:12px!important;margin-bottom:2px!important}
  .kcard-lbl{font-size:8px!important;margin-bottom:2px!important}
  .kcard-sub{font-size:9px!important;gap:3px!important}
  .gy{font-size:9px!important}
  .badge{font-size:9px!important;padding:1px 5px!important}
  .block{padding:10px 10px!important}
  .block-header{margin-bottom:6px!important}
  .block-title{font-size:9px!important}
  .bar-lbl{width:60px!important;font-size:10px!important}
  .bar-val{font-size:10px!important;width:55px!important}
  .mode-bar{flex-direction:column;align-items:flex-start;gap:8px}
  .topbar{flex-direction:column;align-items:flex-start;gap:6px}
  .filters{flex-wrap:wrap;gap:6px}
}
@media(min-width:701px){
  .brand{flex:1}
  .brand-title{font-size:17px}
  body{padding:20px 40px;background:var(--bg)}
  .dash{max-width:1400px;margin:0 auto}
  .kcard{padding:14px 16px}
  .kcard-val{font-size:18px}
  .toplam-val{font-size:34px}
  .block{padding:18px 20px}
}
</style>

const AY_ISIM  = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

let mode     = 'hafta';
let selYear  = 2026;
let selWeek  = 22;
let selAy    = 5;

// ---- FORMAT ----
function fmtTL(v){
  if(v==null) return '—';
  const abs = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if(abs >= 1000000) return sign + '₺' + (abs/1000000).toFixed(2) + 'M';
  return sign + '₺' + Math.round(abs).toLocaleString('tr-TR');
}
function fmtPct(v){ return v==null ? '—' : (v>=0?'+':'')+v.toFixed(1)+'%'; }
function gyBadge(cur, gy){
  if(!cur||!gy||gy===0) return '';
  const pct = ((cur-gy)/Math.abs(gy))*100;
  return `<span class="badge ${pct>=0?'pos':'neg'}">${pct>=0?'↑':'↓'} ${Math.abs(pct).toFixed(1)}%</span>`;
}

// ---- DROPDOWN ----
function toggleDd(){
  document.getElementById('hw-btn').classList.toggle('open');
  document.getElementById('hw-menu').classList.toggle('open');
}
document.addEventListener('click', e=>{
  if(!e.target.closest('#hw-btn')&&!e.target.closest('#hw-menu')){
    document.getElementById('hw-btn').classList.remove('open');
    document.getElementById('hw-menu').classList.remove('open');
  }
});
function buildDd(items, sel, labelFn, onSelect){
  const menu = document.getElementById('hw-menu');
  document.getElementById('hw-label').textContent = labelFn(sel);
  menu.innerHTML='';
  items.forEach(v=>{
    const b = document.createElement('button');
    b.className = 'dd-item'+(v===sel?' active':'');
    b.textContent = labelFn(v);
    b.onclick = ()=>{ onSelect(v); document.getElementById('hw-btn').classList.remove('open'); menu.classList.remove('open'); render(); };
    menu.appendChild(b);
  });
}

// ---- PILLS ----
function makePills(id, items, sel, labelFn, cb){
  const el = document.getElementById(id);
  el.innerHTML='';
  items.forEach(v=>{
    const b = document.createElement('button');
    b.className = 'pill'+(v===sel?' active':'');
    b.textContent = labelFn(v);
    b.onclick = ()=>{ cb(v); render(); };
    el.appendChild(b);
  });
}

// ---- MODE ----
function setMode(m){
  mode = m;
  document.getElementById('tab-hafta').classList.toggle('active', m==='hafta');
  document.getElementById('tab-ay').classList.toggle('active', m==='ay');
  // Reset to last available period
  const RAW = m==='hafta' ? HAFTALIK : AYLIK;
  const periods = Object.values(RAW).filter(x=>x.yil===selYear).map(x=>m==='hafta'?x.hafta:x.ay).sort((a,b)=>a-b);
  if(m==='hafta') selWeek = periods[periods.length-1]||22;
  else selAy = periods[periods.length-1]||5;
  render();
}

// ---- RENDER ----
function render(){
  const RAW = mode==='hafta' ? HAFTALIK : AYLIK;
  const isAy = mode==='ay';

  // Period label
  document.getElementById('period-label').textContent = isAy ? 'Ay' : 'Hafta';
  document.getElementById('toplam-label').textContent = isAy ? 'Aylık Toplam Ciro' : 'Haftalık Toplam Ciro';

  // Year pills
  makePills('fy',[2024,2025,2026],selYear,v=>v,v=>{
    selYear=v;
    const periods = Object.values(RAW).filter(x=>x.yil===v).map(x=>isAy?x.ay:x.hafta).sort((a,b)=>a-b);
    if(isAy) selAy=periods[periods.length-1]||12;
    else selWeek=periods[periods.length-1]||52;
    render();
  });

  // Period dropdown
  const allPeriods = Object.values(RAW).filter(x=>x.yil===selYear).map(x=>isAy?x.ay:x.hafta).sort((a,b)=>a-b);
  const curSel = isAy ? selAy : selWeek;
  buildDd(allPeriods, curSel, v => isAy ? AY_ISIM[v] : String(v), v=>{ if(isAy) selAy=v; else selWeek=v; });

  // Data
  const key = isAy ? `${selYear}_${selAy}` : `${selYear}_${selWeek}`;
  const d = RAW[key];

  // Version date
  document.getElementById('ver-date').textContent = new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});

  if(!d){ document.getElementById('t-val').textContent='Veri yok'; return; }

  const p=d.perakende, gi=d.grup_ici, k=d.kurumsal, e=d.eticaret, t=d.toptan;

  // TOPLAM
  document.getElementById('t-val').textContent = fmtTL(d.toplam_ciro);
  let meta='';
  const prevKey = isAy ? `${selYear}_${selAy-1}` : `${selYear}_${selWeek-1}`;
  const prev = RAW[prevKey];
  if(prev?.toplam_ciro){
    const pct=((d.toplam_ciro-prev.toplam_ciro)/Math.abs(prev.toplam_ciro))*100;
    meta+=`<span class="t-badge ${pct>=0?'pos':'neg'}">${pct>=0?'↑':'↓'} ${Math.abs(pct).toFixed(1)}%</span>`;
    meta+=`<span class="t-label">önceki ${isAy?'aya':'haftaya'} göre</span>`;
  }
  const gyKey = isAy ? `${selYear-1}_${selAy}` : `${selYear-1}_${selWeek}`;
  const gyD = RAW[gyKey];
  if(gyD?.toplam_ciro){
    const pct=((d.toplam_ciro-gyD.toplam_ciro)/Math.abs(gyD.toplam_ciro))*100;
    meta+=`&nbsp;<span class="t-badge ${pct>=0?'pos':'neg'}">${pct>=0?'↑':'↓'} ${Math.abs(pct).toFixed(1)}%</span>`;
    meta+=`<span class="t-label">geçen yıl ${isAy?AY_ISIM[selAy]:'H'+selWeek}</span>`;
  }
  document.getElementById('t-meta').innerHTML=meta;

  // PERAKENDE
  document.getElementById('per-cards').innerHTML=[
    {lbl:'Ciro',     val:fmtTL(p.ciro),   sub:`<span class="gy">GY: ${fmtTL(p.gy_ciro)}</span>`, color:''},
    {lbl:'LfL Adet', val:p.lfl_adet!=null?fmtPct(p.lfl_adet):'—', sub:'', color:p.lfl_adet!=null?(p.lfl_adet>=0?'#2ec99a':'#e05060'):''},
    {lbl:'LfL Ciro', val:p.lfl_ciro!=null?fmtPct(p.lfl_ciro):'—', sub:'', color:p.lfl_ciro!=null?(p.lfl_ciro>=0?'#2ec99a':'#e05060'):''},
    {lbl:'GM%',      val:p.gm!=null?`%${p.gm.toFixed(1)}`:'—', sub:'', color:''},
  ].map(c=>`<div class="kcard"><div class="kcard-lbl">${c.lbl}</div><div class="kcard-val" style="${c.color?'color:'+c.color:''}">${c.val}</div><div class="kcard-sub">${c.sub}</div></div>`).join('');

  // GRUP İÇİ
  document.getElementById('gi-cards').innerHTML=[
    {lbl:'Karaca', cur:gi.krc_ciro,  gy:gi.krc_gy},
    {lbl:'Jumbo',  cur:gi.jmbo_ciro, gy:gi.jmbo_gy},
    {lbl:'Emsan', cur:gi.ems_ciro, gy:gi.ems_gy},
  ].map(c=>`<div class="kcard"><div class="kcard-lbl">${c.lbl}</div><div class="kcard-val">${fmtTL(c.cur)}</div><div class="kcard-sub">${gyBadge(c.cur,c.gy)}${c.gy?`<span class="gy">GY: ${fmtTL(c.gy)}</span>`:''}</div></div>`).join('');

  // KURUMSAL
  document.getElementById('kur-cards').innerHTML=[
    {lbl:'Market Ciro',   val:k.market},
    {lbl:'Grup İçi',      val:k.grup_ici},
    {lbl:'Online Retail', val:k.online_retail},
    {lbl:'Yurt Dışı',     val:k.yurt_disi},
  ].map(c=>`<div class="kcard"><div class="kcard-lbl">${c.lbl}</div><div class="kcard-val" style="font-size:16px">${fmtTL(c.val)}</div></div>`).join('');

  // E-TİCARET
  document.getElementById('et-cards').innerHTML=[
    {lbl:'Web Ciro',    val:e.web},
    {lbl:'Marketplace', val:e.marketplace},
  ].map(c=>`<div class="kcard"><div class="kcard-lbl">${c.lbl}</div><div class="kcard-val">${fmtTL(c.val)}</div></div>`).join('');

  // TOPTAN
  document.getElementById('top-card').innerHTML=`<div class="kcard" style="display:flex;align-items:center;justify-content:space-between"><div><div class="kcard-lbl">Toptan Satış Cirosu</div><div class="kcard-val" style="font-size:22px">${fmtTL(t.ciro)}</div></div><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(240,160,48,.2)" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>`;

  // BARS
  const channels=[
    {lbl:'Perakende', val:p.ciro||0,          color:'#3d8ef0'},
    {lbl:'Grup İçi',  val:(gi.krc_ciro||0)+(gi.jmbo_ciro||0)+(gi.ems_ciro||0), color:'#2ec99a'},
    {lbl:'Kurumsal',  val:(k.market||0)+(k.grup_ici||0)+(k.online_retail||0)+(k.yurt_disi||0), color:'#f0a030'},
    {lbl:'E-Ticaret', val:(e.web||0)+(e.marketplace||0), color:'#e05060'},
    {lbl:'Toptan',    val:t.ciro||0,           color:'#8870e0'},
  ];
  const maxV = Math.max(...channels.map(c=>c.val), 1);
  document.getElementById('bars').innerHTML=channels.map(c=>`<div class="bar-row"><span class="bar-lbl">${c.lbl}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.val/maxV*100)}%;background:${c.color}"></div></div><span class="bar-val">${fmtTL(c.val)}</span></div>`).join('');
}

render();
</script>
</body>
</html>
